name: GitHub Metrics

on:
  schedule:
    - cron: "0 0 * * *"   # Daily at midnight UTC
  workflow_dispatch:        # Manual trigger from Actions tab
  push:
    branches: ["main", "master"]

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # Required to commit the generated SVGs

    steps:
      # ── 1. General stats + languages ─────────────────────────────────────
      - name: Generate stats card
        uses: lowlighter/metrics@v3.34
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          # Use the built-in GITHUB_TOKEN for the commit — this avoids the
          # "sha wasn't supplied" error that affects custom tokens on @latest
          committer_token: ${{ secrets.GITHUB_TOKEN }}
          filename: assets/metrics-stats.svg
          base: header, activity, community, repositories
          plugin_languages: yes
          plugin_languages_indepth: yes
          plugin_languages_limit: 8
          plugin_languages_sections: most-used
          config_timezone: Asia/Kolkata
          config_display: large
          config_animations: yes

      # ── 2. Achievements card ─────────────────────────────────────────────
      - name: Generate achievements card
        uses: lowlighter/metrics@v3.34
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          committer_token: ${{ secrets.GITHUB_TOKEN }}
          filename: assets/metrics-achievements.svg
          base: ""
          plugin_achievements: yes
          plugin_achievements_display: detailed
          plugin_achievements_secrets: yes
          config_timezone: Asia/Kolkata
          config_animations: yes

      # ── 3. Isometric contribution calendar ───────────────────────────────
      - name: Generate isometric calendar
        uses: lowlighter/metrics@v3.34
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          committer_token: ${{ secrets.GITHUB_TOKEN }}
          filename: assets/metrics-calendar.svg
          base: ""
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
          config_timezone: Asia/Kolkata
          config_animations: yes
