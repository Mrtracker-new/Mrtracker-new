name: Terminal Profile

on:
  schedule:
    - cron: "17 0 * * *"
  workflow_dispatch:
  push:
    branches: ["main", "master"]

jobs:
  generate-terminal:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Generate terminal SVG
        env:
          GITHUB_TOKEN: ${{ secrets.METRICS_TOKEN }}
          GH_LOGIN: Mrtracker-new
        run: node scripts/generate-terminal.js

      - name: Commit updated SVG
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/terminal-intro.svg
          if ! git diff --cached --quiet; then
            git commit -m "chore: update terminal profile [skip ci]"
            git push
          else
            echo "No changes to commit"
          fi
