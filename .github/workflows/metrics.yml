name: GitHub Metrics

on:
  # Run daily at midnight UTC
  schedule:
    - cron: "0 0 * * *"
  # Allow manual trigger from Actions tab
  workflow_dispatch:
  # Also run on every push to main/master
  push:
    branches: ["main", "master"]

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # ── 1. General stats card ────────────────────────────────────────────
      - name: Generate stats card
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: assets/metrics-stats.svg
          base: header, activity, community, repositories
          plugin_languages: yes
          plugin_languages_indepth: yes
          plugin_languages_limit: 8
          plugin_languages_sections: most-used
          config_timezone: Asia/Kolkata
          config_display: large
          config_animations: yes
          # Dark theme matching the README palette
          config_template: classic
          config_padding: 6%, 10%

      # ── 2. Achievements card ─────────────────────────────────────────────
      - name: Generate achievements card
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: assets/metrics-achievements.svg
          base: ""
          plugin_achievements: yes
          plugin_achievements_display: detailed
          plugin_achievements_secrets: yes
          plugin_achievements_ignored: ""
          config_timezone: Asia/Kolkata
          config_animations: yes

      # ── 3. Contribution calendar (isometric) ────────────────────────────
      - name: Generate isometric calendar
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: assets/metrics-calendar.svg
          base: ""
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
          config_timezone: Asia/Kolkata
          config_animations: yes
